<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Split a restaurant bill fairly based on what each person ordered.">
  <title>Portion Calculator</title>
  <link rel="icon" href="images/favicon.ico">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      padding: 1rem;
      color: #333;
    }

    .calc {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #1a1a1a;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field { margin-bottom: 1rem; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus { border-color: #28a745; }

    .tip-toggle {
      flex-shrink: 0;
      padding: 0.7rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      min-width: 36px;
      text-align: center;
    }

    .tip-toggle:hover { background: #f0f0f0; border-color: #bbb; }

    /* People section */
    .people-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .people-header label { margin-bottom: 0; }

    .add-btn, .remove-btn {
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .add-btn {
      background: #28a745;
      color: #fff;
    }

    .add-btn:hover { background: #218838; }

    .remove-btn {
      background: #dc3545;
      color: #fff;
      font-size: 1.2rem;
    }

    .remove-btn:hover { background: #c82333; }

    .person-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .person-row input { flex: 1; }

    .person-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      min-width: 18px;
    }

    /* Results */
    .results {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1.5px solid #eee;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
    }

    .result-row:not(:last-child) { border-bottom: 1px solid #f0f0f0; }

    .result-name {
      font-size: 0.9rem;
      color: #555;
    }

    .result-amount {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .result-total {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1.5px solid #ddd;
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1rem;
      color: #1a1a1a;
    }

    .error {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      text-align: center;
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 2rem; }
      .calc { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="calc">
    <h1>Portion Calculator</h1>

    <div class="field">
      <label>Subtotal (before tip & tax)</label>
      <input type="number" id="subtotal" placeholder="0.00" inputmode="decimal" step="0.01">
    </div>

    <div class="field">
      <label>Tax</label>
      <input type="number" id="tax" placeholder="0.00" inputmode="decimal" step="0.01">
    </div>

    <div class="field">
      <label>Tip</label>
      <div class="input-row">
        <input type="number" id="tip" placeholder="0.00" inputmode="decimal" step="0.01">
        <button type="button" class="tip-toggle" id="tip-toggle" title="Toggle between $ and %">$</button>
      </div>
    </div>

    <div class="field">
      <div class="people-header">
        <label>Dishes</label>
        <button type="button" class="add-btn" id="add-person" title="Add person">+</button>
      </div>
      <div id="people"></div>
    </div>

    <div id="results"></div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const state = {
      tipIsPercent: false,
      people: [{ name: '', price: '' }]
    };

    const $ = (id) => document.getElementById(id);

    // Tip toggle
    $('tip-toggle').addEventListener('click', () => {
      state.tipIsPercent = !state.tipIsPercent;
      $('tip-toggle').textContent = state.tipIsPercent ? '%' : '$';
      $('tip').placeholder = state.tipIsPercent ? '18' : '0.00';
      recalc();
    });

    // Add person
    $('add-person').addEventListener('click', () => {
      state.people.push({ name: '', price: '' });
      renderPeople();
    });

    function removePerson(i) {
      if (state.people.length <= 1) return;
      state.people.splice(i, 1);
      renderPeople();
      recalc();
    }

    function renderPeople() {
      const container = $('people');
      container.innerHTML = '';
      state.people.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'person-row';

        const label = document.createElement('span');
        label.className = 'person-label';
        label.textContent = (i + 1);

        const input = document.createElement('input');
        input.type = 'number';
        input.inputMode = 'decimal';
        input.step = '0.01';
        input.placeholder = 'Dish price';
        input.value = p.price;
        input.addEventListener('input', (e) => {
          state.people[i].price = e.target.value;
          recalc();
        });

        row.appendChild(label);
        row.appendChild(input);

        if (state.people.length > 1) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'remove-btn';
          btn.textContent = '\u00d7';
          btn.title = 'Remove';
          btn.addEventListener('click', () => removePerson(i));
          row.appendChild(btn);
        }

        container.appendChild(row);
      });
    }

    function recalc() {
      const errorEl = $('error');
      const resultsEl = $('results');
      errorEl.textContent = '';
      resultsEl.innerHTML = '';

      const subtotal = parseFloat($('subtotal').value);
      const tax = parseFloat($('tax').value) || 0;
      const tipRaw = parseFloat($('tip').value) || 0;

      if (!subtotal || subtotal <= 0) return;

      const tip = state.tipIsPercent ? subtotal * (tipRaw / 100) : tipRaw;

      const prices = state.people.map(p => parseFloat(p.price) || 0);
      const priceSum = prices.reduce((a, b) => a + b, 0);

      if (priceSum <= 0) return;

      if (priceSum > subtotal * 1.01) {
        errorEl.textContent = 'Dish prices exceed the subtotal.';
        return;
      }

      if (tax > subtotal) {
        errorEl.textContent = 'Tax exceeds the subtotal.';
        return;
      }

      let totalCheck = 0;
      const portions = prices.map((price, i) => {
        const ratio = price / subtotal;
        const portion = price + ratio * (tip + tax);
        totalCheck += portion;
        return { index: i + 1, portion };
      });

      let html = '<div class="results">';
      portions.forEach(p => {
        html += `<div class="result-row">
          <span class="result-name">Person ${p.index}</span>
          <span class="result-amount">$${p.portion.toFixed(2)}</span>
        </div>`;
      });

      html += `<div class="result-total">
        <span>Total</span>
        <span>$${totalCheck.toFixed(2)}</span>
      </div>`;
      html += '</div>';

      resultsEl.innerHTML = html;
    }

    // Listen for input on shared fields
    ['subtotal', 'tax', 'tip'].forEach(id => {
      $(id).addEventListener('input', recalc);
    });

    // Initial render
    renderPeople();
  </script>

</body>
</html>
